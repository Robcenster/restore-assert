engine: "postgres"

docker:
  image: "postgres:17-alpine"

restore:
  analyze: true
  on_error_stop: true
  single_transaction: true
  parallel_jobs: 1
  no_owner: false
  full_restore_logs: false
  no_privileges: false

database:
  db_name: "postgres"
  user: "postgres"
  password: "supersecretpassword"

asserts:
  # =======================================================================
  # БЛОК 1: Проверка контента и математики (Data & Math)
  # =======================================================================
  - name: "Проверка: Ровно 3 пользователя в core_data"
    query: "SELECT COUNT(*) FROM core_data.users;"
    type: "int"
    operator: "=="
    expected: "3"

  - name: "Проверка: Общий баланс всех кошельков равен 101499.50"
    query: "SELECT SUM(balance) FROM billing_secure.wallets;"
    type: "float"
    operator: "=="
    expected: "101499.50"

  - name: "Проверка: Баланс murad_admin строго больше 50000"
    query: "SELECT balance FROM billing_secure.wallets w JOIN core_data.users u ON w.owner_id = u.user_id WHERE u.username = 'murad_admin';"
    type: "float"
    operator: ">"
    expected: "50000.0"

  - name: "Проверка: У гостя нулевой баланс"
    query: "SELECT balance FROM billing_secure.wallets w JOIN core_data.users u ON w.owner_id = u.user_id WHERE u.username = 'guest_user';"
    type: "float"
    operator: "=="
    expected: "0.0"

  - name: "Проверка: Всего создано ровно 2 транзакции"
    query: "SELECT COUNT(*) FROM analytics_priv.transaction_logs;"
    type: "int"
    operator: "=="
    expected: "2"

  - name: "Проверка: Сумма депозита murad_admin равна 500.00"
    query: "SELECT amount FROM analytics_priv.transaction_logs WHERE tx_type = 'deposit';"
    type: "float"
    operator: "=="
    expected: "500.00"

  # =======================================================================
  # БЛОК 2: Строки и текстовые операторы (Strings & Citext)
  # =======================================================================
  - name: "Проверка: Поиск пользователя alex_dev"
    query: "SELECT username FROM core_data.users WHERE username = 'ALEX_DEV';" # citext должен простить регистр!
    type: "string"
    operator: "=="
    expected: "alex_dev"

  - name: "Проверка: Проверка префикса имени админа"
    query: "SELECT username FROM core_data.users WHERE username = 'murad_admin';"
    type: "string"
    operator: "contains"
    expected: "murad"

  # =======================================================================
  # БЛОК 3: Проверка вьюх и кросс-схемных связей (Views & Joins)
  # =======================================================================
  - name: "Проверка: Во вьюхе v_rich_users_report ровно 2 богатых юзера"
    query: "SELECT COUNT(*) FROM core_data.v_rich_users_report;"
    type: "int"
    operator: "=="
    expected: "2"

  # =======================================================================
  # БЛОК 4: Расширения и Системные проверки (Extensions & DB State)
  # =======================================================================
  - name: "Проверка: Расширение uuid-ossp успешно установлено"
    query: "SELECT extname FROM pg_extension WHERE extname = 'uuid-ossp';"
    type: "string"
    operator: "=="
    expected: "uuid-ossp"

  - name: "Проверка: Расширение pgcrypto успешно установлено"
    query: "SELECT extname FROM pg_extension WHERE extname = 'pgcrypto';"
    type: "string"
    operator: "=="
    expected: "pgcrypto"

  - name: "Проверка: Роль app_readonly создана"
    query: "SELECT rolname FROM pg_roles WHERE rolname = 'app_readonly';"
    type: "string"
    operator: "=="
    expected: "app_readonly"

  - name: "Проверка: Владельцем схемы core_data является schema_manager"
    query: "SELECT r.rolname FROM pg_namespace n JOIN pg_roles r ON n.nspowner = r.oid WHERE n.nspname = 'core_data';"
    type: "string"
    operator: "=="
    expected: "schema_manager"

  # =======================================================================
  # БЛОК 5: Проверка прав ролей (Grants & RBAC)
  # =======================================================================
  - name: "Проверка: app_readonly имеет права на SELECT таблицы users"
    query: "SELECT has_table_privilege('app_readonly', 'core_data.users', 'SELECT')::text;"
    type: "bool"
    operator: "=="
    expected: "true"

  - name: "Проверка: app_readonly НЕ может делать INSERT в таблицу users"
    query: "SELECT has_table_privilege('app_readonly', 'core_data.users', 'INSERT')::text;"
    type: "bool"
    operator: "=="
    expected: "false"

  - name: "Проверка: app_writer МОЖЕТ делать INSERT в логи транзакций"
    query: "SELECT has_table_privilege('app_writer', 'analytics_priv.transaction_logs', 'INSERT')::text;"
    type: "bool"
    operator: "=="
    expected: "true"

  - name: "Проверка: app_writer НЕ имеет права SELECT на core_data.users"
    query: "SELECT has_table_privilege('app_writer', 'core_data.users', 'SELECT')::text;"
    type: "bool"
    operator: "=="
    expected: "false"

  # =======================================================================
  # БЛОК 6: Стресс-тест на падения и ошибки (Negative Tests)
  # =======================================================================
  - name: "Негативный тест: Запрос к несуществующей таблице должен упасть"
    query: "SELECT * FROM core_data.non_existent_table;"
    type: "error"

  - name: "Негативный тест: Попытка вставить текст вместо баланса должна упасть (проверка CHECK)"
    query: "INSERT INTO billing_secure.wallets (owner_id, balance) VALUES ('00000000-0000-0000-0000-000000000000'::uuid, -500.00);"
    type: "error"

  - name: "Позитивный тест: Корректный запрос должен пройти без ошибок"
    query: "SELECT 1;"
    type: "noerror"