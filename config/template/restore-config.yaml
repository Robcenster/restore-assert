engine: "postgres" # Database engine type (postgres, mssql, oracle, etc.)

docker:
  image: "postgres:17-alpine" # Docker image for the temporary environment
  container_name: "restore-assert-vp" # Name of the spawned container
  memory_limit: "512MB" # RAM limit for the container
  cpu_limit: "1.0" # CPU core limit (e.g., 0.5, 1.0)

database:
  db_name: "postgres" # Target database name
  user: "admin" # Database administrative user
  password: "very_secret_password" # Administrative password
  extensions: # List of required PostgreSQL extensions
    - "uuid-ossp"
    - "pg_trgm"
  roles: # Roles to be created before restoration
    - "postgres"
    - "warehouse_analyst"
    - "warehouse_app_user"

  settings: # Custom postgresql.conf parameters (via -c flags)
    max_connections: "50" # Maximum concurrent connections
    shared_buffers: "128MB" # Memory for caching data
    fsync: "off" # Disables disk sync for faster testing (unsafe for prod)

restore:
  parallel_jobs: 1 # Number of threads for pg_restore
  analyze: true # Run ANALYZE to update statistics after restore
  on_error_stop: true
  single_transaction: false # Use a single transaction for the whole restore
  no_owner: true # Skip restoration of object ownership
  no_privileges: true # Skip restoration of access privileges (GRANT/REVOKE)
  show_restore_logs: false # Print verbose logs from restore utilities
  show_db_info: true # Display database summary after restore
  show_success_tests: false # Only show failed assertions in the report

asserts: # Logical validation checks
  # 1. Quick existence checks for DB objects
  existence:
    extensions: ["uuid-ossp", "pg_stat_statements"] # Verify extensions
    roles: ["app_writer", "app_readonly"] # Verify roles
    schemas: ["public", "audit"] # Verify schemas

  # 2. Table integrity and volume checks
  tables:
    - name: "users"
      metrics:
        - type: "row_count" # Check number of records
          condition: "gt" # Comparison: eq, gt, lt, not_empty
          expected: 100 
          
        - type: "table_size" # Check physical table size
          condition: "gt"
          expected: "50MB"

        - type: "sequence_health" # Verify that sequences match MAX(id)
          severity: "error"

    - name: "orders"
      metrics:
        - type: "row_count" # Default condition is 'eq'
          expected: 1000 

        - type: "freshness" # Check if data is up-to-date
          column: "created_at" # Date/time column for check
          max_age: "24h" # Max allowed age of the newest record

  # 3. Data quality checks (e.g., corruption or partial exports)
    - name: "transactions"
      metrics:
        - type: "null_ratio" # Check percentage of NULL values in a column
          column: "payout_gateway_id"
          max_percent: 0.05 # Max 5% NULLs allowed

  # 4. Security and permission auditing
  privileges:
    - role: "app_readonly"
      table: "salaries"
      allowed: ["SELECT"] # Exactly these permissions are allowed
      forbidden: ["INSERT", "UPDATE", "DELETE"] # These must NOT exist

  # 5. Custom SQL assertions
  queries:
    - name: "Check Total Revenue" # Business logic validation
      query: "SELECT sum(amount)::text FROM orders WHERE status = 'paid'"
      condition: "gt"
      expected: "1000000"

    # Пример: Проверка консистентности (отсутствие "сирот").
    - name: "Orphaned Profiles"
      query: "SELECT count(*)::text FROM profiles p LEFT JOIN users u ON p.user_id = u.id WHERE u.id IS NULL"
      condition: "eq"
      expected: "0"

    - name: "Кастомная проверка"
      query: "SELECT count(*) FROM inventoris.Tests"
      condition: "eq"
      expected: "0"
