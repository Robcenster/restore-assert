engine: "postgres" # Database engine type (postgres, mssql, oracle, etc.)

docker:
  image: "postgres:17-alpine" # Docker image for the temporary environment
  container_name: "restore-assert-vp" # Name of the spawned container
  memory_limit: "512MB" # RAM limit for the container
  cpu_limit: "1.0" # CPU core limit (e.g., 0.5, 1.0)

database:
  # db_name: "cinema" # Target database name
  user: "admin" # Database administrative user
  password: "very_secret_password" # Administrative password
  extensions: # List of required PostgreSQL extensions
    - "uuid-ossp"
    - "pg_trgm"
    - "pg_stat_statements"
  roles: # Roles to be created before restoration
    - "app_admin"
    - "app_readonly"

  settings: # Custom postgresql.conf parameters (via -c flags)
    max_connections: "50" # Maximum concurrent connections
    shared_buffers: "128MB" # Memory for caching data
    fsync: "off" # Disables disk sync for faster testing (unsafe for prod)

restore:
  parallel_jobs: 1 # Number of threads for pg_restore
  analyze: true # Run ANALYZE to update statistics after restore
  on_error_stop: true
  single_transaction: false # Use a single transaction for the whole restore
  no_owner: false # Skip restoration of object ownership
  no_privileges: false # Skip restoration of access privileges (GRANT/REVOKE)
  show_restore_logs: false # Print verbose logs from restore utilities
  show_db_info: true # Display database summary after restore
  show_success_tests: true # Only show failed assertions in the report
  # modify_template: true # If the file extension error persists 

asserts:
  # 1. Быстрые проверки существования объектов
  existence:
    extensions: ["uuid-ossp", "pg_stat_statements", "pg_trgm"]
    roles: ["app_admin", "app_readonly"]
    schemas: ["public", "audit"]

  # 2. Интегрити таблиц, объем данных и качество
  tables:
    - name: "public.movies"
      metrics:
        - type: "row_count"
          condition: "eq"
          expected: 1000

        - type: "table_size"
          condition: "gt"
          expected: "50KB" # 1000 записей с UUID и строками точно превысят 50KB

        - type: "freshness"
          column: "created_at"
          max_age: "24h" # Данные генерируются с отставанием максимум в 12 часов

        - type: "null_ratio"
          column: "release_year"
          max_percent: 0.05 # Мы заложили около 2% NULL значений в скрипте

    - name: "audit.logs"
      metrics:
        - type: "row_count"
          condition: "eq"
          expected: 100


    - name: "public.movie_facts"
      metrics:
        - type: "row_count"
          condition: "eq"
          expected: 500

  # 3. Аудит безопасности и прав доступа
  privileges:
    - role: "app_readonly"
      table: "public.movies"
      allowed: ["SELECT"]
      forbidden: ["INSERT", "UPDATE", "DELETE", "TRUNCATE"]

    - role: "app_readonly"
      table: "public.movie_facts"
      allowed: ["SELECT"]
      forbidden: ["INSERT", "UPDATE", "DELETE"]

  # 4. Кастомные SQL-проверки (Бизнес-логика и консистентность)
  queries:
    - name: "Орфанные факты (Отсутствуют ссылки на фильмы)"
      query: "SELECT count(*)::text FROM public.movie_facts f LEFT JOIN public.movies m ON f.movie_id = m.id WHERE m.id IS NULL"
      condition: "eq"
      expected: "0"

    - name: "Проверка наличия верифицированных администратором фактов"
      # Убеждаемся, что хотя бы 50 фактов прошли модерацию (мы заложили ~30% от 500, то есть ~150)
      query: "SELECT (count(*) > 50)::text FROM public.movie_facts WHERE is_verified = true"
      condition: "eq"
      expected: "true"

    - name: "Отсутствие дубликатов в логах аудита"
      # Проверяем, что нет записей с одинаковым ID (дополнительная страховка целостности)
      query: "SELECT (count(id) - count(DISTINCT id))::text FROM audit.logs"
      condition: "eq"
      expected: "0"